<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .form {
            background: #2b2b2b;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .line {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        label {
            font-size: 14px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1e1e1e;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4da3ff;
            box-shadow: 0 0 5px #4da3ff;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #4da3ff;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #2f86e0;
        }

        .error {
            color: #ff6b6b;
            font-size: 12px;
        }

        input.invalid {
            border-color: #ff6b6b;
        }

        .strength {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 5px;
            overflow: hidden;
        }

        #strength-bar {
            height: 100%;
            width: 0%;
            transition: 0.3s;
        }

        #strength-text {
            font-size: 12px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Registration Form</h1>

        <form class="form" action="submit"">

            <div class="line">
                <label for="name-input">Name</label>
                <input id="name-input" type="text" placeholder="John Doe">
                <small class="error" id="name-error"></small>
            </div>

            <div class="line">
                <label for="email-input">Email</label>
                <input id="email-input" type="email" placeholder="john@gmail.com">
                <small class="error" id="email-error"></small>
            </div>

            <div class="line">
                <label for="phone-input">Phone</label>
                <input id="phone-input" type="tel" placeholder="1234567890">
                <small class="error" id="phone-error"></small>
            </div>

            <div class="line">
                <label for="password-input">Password</label>
                <div style="display:flex; width:100%; height:100%; gap:5px; justify-content:center; align-items:center;">
                    <input id="password-input" type="password" placeholder="...">
                    <button type="button" id="toggle-password">show</button>
                </div>
                <small class="error" id="password-error"></small>
                <div class="strength">
                    <div id="strength-bar"></div>
                </div>
                <small id="strength-text"></small>
            </div>

            <button type="submit">Register</button>

        </form>

    </div>


    <script>

        const form = document.querySelector('.form');

        const nameI = form.querySelector('#name-input');
        const nameError = document.querySelector('#name-error');
        
        const emailI = form.querySelector('#email-input');
        const emailError = document.querySelector('#email-error');

        const phoneI = form.querySelector('#phone-input');
        const phoneError = document.querySelector('#phone-error');
        
        const passwordI = form.querySelector('#password-input');
        const togglePassword = document.querySelector('#toggle-password');
        const passwordError = document.querySelector('#password-error');
        const strengthBar = document.querySelector('#strength-bar');
        const strengthText = document.querySelector('#strength-text');

        form.addEventListener('submit', (event) => {
            event.preventDefault();
        });

        nameI.addEventListener('input', () => {
            const val = nameI.value;
            if (val.length < 6) {
                nameError.textContent = "Name must be at least 6 characters";
                nameI.classList.add("invalid");
            } else {
                nameError.textContent = "";
                nameI.classList.remove("invalid");
            }
        });

        emailI.addEventListener('input', () => {
            const val = emailI.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(val)) {
                emailError.textContent = "Invalid Email Address";
                emailI.classList.add("invalid");
            } else {
                emailError.textContent = "";
                emailI.classList.remove("invalid");
            }
        });

        phoneI.addEventListener('input', () => {
            const val = phoneI.value;
            if (!/^\d{10}$/.test(val)) {
                phoneError.textContent = "Phone must be 10 digits";
                phoneI.classList.add("invalid");
            } else {
                phoneError.textContent = "";
                phoneI.classList.remove("invalid");
            }
        });

        passwordI.addEventListener('input', () => {
            const val = passwordI.value;

            let strength = 0;

            if (val.length >= 8) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            if (val.length < 8) {
                passwordError.textContent = "Password must be at least 8 characters";
                passwordI.classList.add("invalid");
            } else {
                passwordError.textContent = "";
                passwordI.classList.remove("invalid");
            }

            if (strength === 1) {
                strengthBar.style.width = "25%";
                strengthBar.style.background = "red";
                strengthText.textContent = "Weak";
            }
            else if (strength === 2) {
                strengthBar.style.width = "50%";
                strengthBar.style.background = "orange";
                strengthText.textContent = "Medium";
            }
            else if (strength === 3) {
                strengthBar.style.width = "75%";
                strengthBar.style.background = "yellow";
                strengthText.textContent = "Strong";
            }
            else if (strength === 4) {
                strengthBar.style.width = "100%";
                strengthBar.style.background = "limegreen";
                strengthText.textContent = "Very Strong";
            }
        });

        togglePassword.addEventListener('click', () => {
            if (passwordI.type === "password") {
                passwordI.type = "text";
                togglePassword.textContent = "hide";
            } else {
                passwordI.type = "password";
                togglePassword.textContent = "show";
            }
        });
        
        form.addEventListener('submit', (event) => {
            event.preventDefault();
            if (
                nameI.classList.contains("invalid") ||
                emailI.classList.contains("invalid") ||
                phoneI.classList.contains("invalid") ||
                passwordI.classList.contains("invalid")
            ) {
                alert("Please fix errors before submitting");
                return;
            }
            const submission = {
                name: nameI.value,
                email: emailI.value,
                phone: phoneI.value,
                password: passwordI.value
            };
            const existing = JSON.parse(localStorage.getItem("submissions")) || [];
            existing.push(submission);
            localStorage.setItem("submissions", JSON.stringify(existing));
            alert("Registration Saved!");
            form.reset();
        });

    </script>


</body>

</html>
