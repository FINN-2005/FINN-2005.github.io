<!-- templates/login.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KCC Student Portal - Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/styles.css">

    <script>
        // apply persisted or system theme before content loads
        (function() {
            const stored = localStorage.getItem('theme');
            if (stored) {
                document.documentElement.setAttribute('data-theme', stored);
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

</head>

<body class="login flex items-center justify-center min-h-screen">

    <div class="card w-96 bg-base-100/60 backdrop-blur shadow-xl">

        <div class="card-body">

            <div class="flex justify-end">
                <button id="theme-toggle" class="btn btn-ghost btn-circle" title="Toggle theme">
                    🌙
                </button>
            </div>

            <h2 class="card-title text-2xl justify-center">
                KCC Student Portal
            </h2>

            <form method="post" action="/login" class="space-y-4 mt-4">

                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Username</span>
                    </label>
                    <input type="text" name="username" placeholder="Enter your username" class="input input-bordered"
                        required>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text">Password</span>
                    </label>
                    <input type="password" name="password" placeholder="Enter your password"
                        class="input input-bordered" required>
                </div>

                <div class="form-control mt-6">
                    <button class="btn btn-primary w-full">
                        Login
                    </button>
                </div>

            </form>

        </div>

    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
